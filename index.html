    :root {

      font-size: 14px;
      line-height: 1.6;
      overflow-x: hidden;

    /* CRT effects */
    body::before {
      content: '';
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: repeating-linear-gradient(
        0deg,
        var(--scanline) 0px,
        var(--scanline) 1px,
        transparent 1px,
        transparent 3px
      );
      pointer-events: none;
      z-index: 1000;
    }

    body::after {
      content: '';
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: radial-gradient(ellipse at center,
        transparent 60%,
        rgba(0,0,0,0.6) 100%
      );
      pointer-events: none;
      z-index: 999;
    }

    #terminal {

      background: var(--green);

      vertical-align: text-bottom;

    imageData.data[i] = v;
    imageData.data[i+1] = v;
    imageData.data[i+2] = v;
    imageData.data[i+3] = 255;

  ctx.putImageData(imageData, 0, 0);
}

function appendLine(html, extraClass = '') {

  el.className = 'line ' + extraClass;
  el.innerHTML = html;
  output.appendChild(el);
  output.appendChild(document.createTextNode('\n'));
  window.scrollTo(0, document.body.scrollHeight);
}

function blank() { appendLine(''); }

// Queue of {delay, lines[]} blocks
const queue = [];
let running = false;

function enqueue(delay, ...htmlLines) {
  queue.push({ delay, lines: htmlLines });
}

function runQueue() {
  if (running || queue.length === 0) return;
  running = true;
  const item = queue.shift();
  setTimeout(() => {
    for (const line of item.lines) appendLine(line);
    running = false;
    runQueue();
  }, item.delay);
}
